<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="文字ならべ">
<title>文字ならべゲーム</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1e3d6e;font-family:'Hiragino Kaku Gothic Pro',sans-serif;
  color:#fff;-webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  padding:max(20px,env(safe-area-inset-top)) 12px 24px;
  min-height:100svh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;gap:16px;overflow-y:auto}

/* ===== 設定画面 ===== */
#setup{position:fixed;inset:0;background:#1e3d6e;z-index:500;overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;
  gap:18px;padding:max(24px,env(safe-area-inset-top)) 16px 36px}
#setup h1{font-size:22px;letter-spacing:.08em;text-align:center}
.hint-box{background:rgba(255,255,255,.1);border-radius:12px;
  padding:12px 18px;font-size:14px;line-height:2.2;
  width:100%;max-width:480px;text-align:center}
.hint-box b{color:#FFD700}
.restore-banner{background:rgba(76,175,80,.2);border:1px solid rgba(76,175,80,.5);
  border-radius:8px;padding:8px 16px;font-size:13px;color:#a8e6a3;text-align:center;
  width:100%;max-width:480px}

/* 問題数セレクタ */
.count-wrap{display:flex;align-items:center;gap:12px}
.count-label{font-size:15px;color:rgba(255,255,255,.85)}
.count-btns{display:flex;gap:6px}
.cnt-btn{width:46px;height:46px;border-radius:10px;
  border:2px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.08);color:#fff;
  font-size:19px;font-weight:bold;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:.15s}
.cnt-btn.active{background:#4CAF50;border-color:#4CAF50}

/* 問題スロット */
#slots-wrap{display:flex;flex-direction:column;gap:10px;width:100%;max-width:480px}
.q-slot{display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.08);border-radius:12px;padding:10px}
.q-num{font-size:22px;min-width:34px;text-align:center;flex-shrink:0}
.img-mini{width:80px;height:80px;flex-shrink:0;background:rgba(0,0,0,.3);
  border:2px dashed rgba(255,255,255,.3);border-radius:10px;cursor:pointer;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent}
.img-mini.filled{border-style:solid;border-color:#4CAF50}
.img-mini input[type=file]{position:absolute;width:0;height:0;opacity:0}
.mini-icon{font-size:24px;pointer-events:none}
.mini-preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.q-text{flex:1;min-width:0;padding:10px 10px;font-size:20px;border-radius:8px;
  border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);
  color:#fff;text-align:center;letter-spacing:.1em;outline:none;
  -webkit-user-select:text;user-select:text}
.q-text:focus{border-color:#FFD700;background:rgba(255,255,255,.15)}
.q-text::placeholder{color:rgba(255,255,255,.3);font-size:13px;letter-spacing:.02em}

#start-btn{background:#4CAF50;color:#fff;border:none;padding:16px 54px;
  font-size:22px;font-weight:bold;border-radius:14px;cursor:pointer;
  letter-spacing:.08em;box-shadow:0 4px 16px rgba(76,175,80,.4);
  -webkit-tap-highlight-color:transparent}
#start-btn:active{transform:scale(.97)}
#start-btn:disabled{background:#555;box-shadow:none;opacity:.5;cursor:not-allowed}

/* ===== ゲーム画面 ===== */
.game-title{font-size:20px;letter-spacing:.08em;text-align:center}
.progress{font-size:15px;color:rgba(255,255,255,.7);text-align:center}
#game-image{width:100%;max-width:340px;max-height:230px;object-fit:contain;
  border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.4);display:none}
.hint{font-size:14px;color:rgba(255,255,255,.7);text-align:center}
#tile-area{width:100%;max-width:640px;background:rgba(0,0,0,.25);
  border-radius:16px;padding:14px 10px}
.trow{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:nowrap}
.tile{flex:1 1 0;min-width:44px;max-width:88px;aspect-ratio:1;
  background:#fff;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(18px,5vw,38px);font-weight:bold;color:#1e3d6e;
  cursor:grab;touch-action:none;box-shadow:0 3px 10px rgba(0,0,0,.28);
  user-select:none;transition:opacity .15s,background .3s,color .3s}
.tile.ghost{opacity:.2;transform:scale(.93)}
.tile.correct{background:#4CAF50;color:#fff;cursor:default;box-shadow:0 2px 6px rgba(76,175,80,.4)}
.dclone{position:fixed;pointer-events:none;z-index:9999;border-radius:10px;
  box-shadow:0 8px 26px rgba(0,0,0,.5);transform:scale(1.12);background:#FFD700;
  display:flex;align-items:center;justify-content:center;font-weight:bold;color:#333}
#check-btn{background:#4CAF50;color:#fff;border:none;padding:15px 52px;
  font-size:21px;font-weight:bold;border-radius:14px;cursor:pointer;
  letter-spacing:.08em;box-shadow:0 4px 16px rgba(76,175,80,.4);
  -webkit-tap-highlight-color:transparent;transition:.2s}
#check-btn:active{transform:scale(.97)}
#check-btn:disabled{background:#555;box-shadow:none;opacity:.5;cursor:not-allowed}
#result{font-size:20px;font-weight:bold;min-height:28px;text-align:center;letter-spacing:.04em}
#result.ok{color:#4CAF50}
#result.ng{color:#ff6b6b}
.action-btns{display:none;flex-direction:column;align-items:center;gap:12px}
#retry-btn{background:#e67e22;color:#fff;border:none;padding:13px 44px;
  font-size:18px;font-weight:bold;border-radius:12px;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
#back-btn{background:rgba(255,255,255,.12);color:#fff;
  border:2px solid rgba(255,255,255,.3);padding:10px 32px;
  font-size:15px;border-radius:10px;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
</style>
</head>
<body>

<!-- 設定画面 -->
<div id="setup">
  <h1>🔤 文字ならべゲーム</h1>
  <div class="hint-box">
    <b>① 問題の数を選ぶ</b><br>
    <b>② 各問題の画像とひらがなを設定する</b><br>
    <b>③ ゲームスタート！</b>
  </div>
  <div id="restore-banner" class="restore-banner" style="display:none">✅ 前回の設定を読み込みました</div>
  <div class="count-wrap">
    <span class="count-label">問題の数</span>
    <div class="count-btns" id="count-btns">
      <button class="cnt-btn active" data-n="1">1</button>
      <button class="cnt-btn" data-n="2">2</button>
      <button class="cnt-btn" data-n="3">3</button>
      <button class="cnt-btn" data-n="4">4</button>
      <button class="cnt-btn" data-n="5">5</button>
    </div>
  </div>
  <div id="slots-wrap"></div>
  <button id="start-btn" disabled>ゲームスタート ▶</button>
</div>

<!-- ゲーム画面 -->
<h1 class="game-title">🔤 文字ならべゲーム</h1>
<p class="progress" id="progress"></p>
<img id="game-image" alt="問題の画像">
<p class="hint">文字を正しい順番に並べよう！</p>
<div id="tile-area"><div class="trow" id="trow"></div></div>
<button id="check-btn">解答する ✓</button>
<div id="result"></div>
<div class="action-btns" id="action-btns">
  <button id="retry-btn">🔄 もう一度！</button>
  <button id="back-btn">⚙️ 設定に戻る</button>
</div>

<script>
"use strict";
var COUNT = 1;
var slots = [];
var QUESTIONS = [];
var qIdx = 0;
var chars = [], order = [];
var drag = {val:null,fromIdx:-1,cl:null,ox:0,oy:0,w:0,h:0};
var solved = false;
var NUMS = ["①","②","③","④","⑤"];

/* ===== IndexedDB ===== */
var DB = null;
function openDB(cb){
  if(DB){cb(DB);return;}
  var req = indexedDB.open("MojiNarabe",1);
  req.onupgradeneeded = function(e){e.target.result.createObjectStore("assets");};
  req.onsuccess = function(e){DB=e.target.result;cb(DB);};
  req.onerror = function(){cb(null);};
}
function saveImageToDB(n,blob){
  openDB(function(db){
    if(!db)return;
    db.transaction("assets","readwrite").objectStore("assets").put(blob,"image_"+n);
  });
}
function loadImageFromDB(n,cb){
  openDB(function(db){
    if(!db){cb(null);return;}
    var req=db.transaction("assets","readonly").objectStore("assets").get("image_"+n);
    req.onsuccess=function(e){cb(e.target.result||null);};
    req.onerror=function(){cb(null);};
  });
}

/* ===== 設定画面 ===== */
function renderSlots(){
  while(slots.length < COUNT) slots.push({blob:null,url:null,text:""});
  var wrap = document.getElementById("slots-wrap");
  wrap.innerHTML = "";
  for(var i=0;i<COUNT;i++){
    (function(n){
      var row = document.createElement("div");
      row.className = "q-slot"; row.id = "slot-"+n;
      var num = document.createElement("span");
      num.className = "q-num"; num.textContent = NUMS[n];
      var lbl = document.createElement("label");
      lbl.className = "img-mini"+(slots[n].blob?" filled":"");
      lbl.htmlFor = "fi-"+n;
      var fi = document.createElement("input");
      fi.type="file"; fi.id="fi-"+n; fi.accept="image/*";
      fi.addEventListener("change",function(){
        var file=this.files&&this.files[0]; if(!file)return;
        slots[n].blob=file;
        if(slots[n].url)URL.revokeObjectURL(slots[n].url);
        slots[n].url=URL.createObjectURL(file);
        saveImageToDB(n,file);
        refreshSlotImage(n);
        checkReady();
      });
      var icon = document.createElement("span");
      icon.className="mini-icon"; icon.textContent="🖼️";
      if(slots[n].blob) icon.style.display="none";
      var prev = document.createElement("img");
      prev.className="mini-preview"; prev.id="prev-"+n;
      if(slots[n].url){prev.src=slots[n].url;prev.style.display="block";}
      lbl.appendChild(fi); lbl.appendChild(icon); lbl.appendChild(prev);
      var ti = document.createElement("input");
      ti.type="text"; ti.className="q-text"; ti.id="ti-"+n;
      ti.placeholder="ひらがな"; ti.autocomplete="off";
      ti.setAttribute("autocorrect","off");
      ti.setAttribute("autocapitalize","off");
      ti.spellcheck=false;
      ti.value=slots[n].text||"";
      ti.addEventListener("input",function(){
        slots[n].text=this.value.trim();
        try{localStorage.setItem("mn_text_"+n,slots[n].text);}catch(e){}
        checkReady();
      });
      row.appendChild(num); row.appendChild(lbl); row.appendChild(ti);
      wrap.appendChild(row);
    })(i);
  }
}
function refreshSlotImage(n){
  var lbl=document.querySelector("#slot-"+n+" .img-mini");
  var icon=document.querySelector("#slot-"+n+" .mini-icon");
  var prev=document.querySelector("#slot-"+n+" .mini-preview");
  if(lbl)lbl.classList.add("filled");
  if(icon)icon.style.display="none";
  if(prev){prev.src=slots[n].url;prev.style.display="block";}
}
function checkReady(){
  var ok=true;
  for(var i=0;i<COUNT;i++){
    if(!slots[i]||!slots[i].blob||!slots[i].text||slots[i].text.length===0){ok=false;break;}
  }
  document.getElementById("start-btn").disabled=!ok;
}

/* 問題数ボタン */
Array.from(document.getElementById("count-btns").querySelectorAll(".cnt-btn")).forEach(function(btn){
  btn.addEventListener("click",function(){
    COUNT=parseInt(this.dataset.n);
    try{localStorage.setItem("mn_count",COUNT);}catch(e){}
    Array.from(document.getElementById("count-btns").querySelectorAll(".cnt-btn")).forEach(function(b){
      b.classList.toggle("active",parseInt(b.dataset.n)===COUNT);
    });
    renderSlots();
    checkReady();
  });
});

document.getElementById("start-btn").addEventListener("click",function(){
  QUESTIONS=[];
  for(var i=0;i<COUNT;i++) QUESTIONS.push({url:slots[i].url,text:slots[i].text});
  startGame();
});
document.getElementById("retry-btn").addEventListener("click",function(){
  document.getElementById("action-btns").style.display="none";
  qIdx=0; initRound();
});
document.getElementById("back-btn").addEventListener("click",function(){
  document.getElementById("setup").style.display="flex";
  document.getElementById("action-btns").style.display="none";
  document.getElementById("result").textContent="";
  document.getElementById("result").className="";
  document.getElementById("game-image").style.display="none";
  document.getElementById("progress").textContent="";
});

/* 前回設定を復元 */
(function(){
  var saved=parseInt(localStorage.getItem("mn_count"))||1;
  COUNT=Math.max(1,Math.min(5,saved));
  Array.from(document.getElementById("count-btns").querySelectorAll(".cnt-btn")).forEach(function(b){
    b.classList.toggle("active",parseInt(b.dataset.n)===COUNT);
  });
  for(var i=0;i<COUNT;i++){
    slots.push({blob:null,url:null,text:localStorage.getItem("mn_text_"+i)||""});
  }
  var loaded=0,hasAny=false;
  function done(){
    renderSlots();
    checkReady();
    if(hasAny) document.getElementById("restore-banner").style.display="block";
  }
  if(COUNT===0){done();return;}
  for(var j=0;j<COUNT;j++){
    (function(n){
      loadImageFromDB(n,function(blob){
        if(blob){
          slots[n].blob=blob;
          if(slots[n].url)URL.revokeObjectURL(slots[n].url);
          slots[n].url=URL.createObjectURL(blob);
          hasAny=true;
        }
        loaded++;
        if(loaded===COUNT) done();
      });
    })(j);
  }
})();

/* ===== ゲームロジック ===== */
function startGame(){
  document.getElementById("setup").style.display="none";
  qIdx=0; initRound();
}
function initRound(){
  var q=QUESTIONS[qIdx];
  document.getElementById("game-image").src=q.url;
  document.getElementById("game-image").style.display="block";
  document.getElementById("progress").textContent=
    QUESTIONS.length>1 ? "問題 "+(qIdx+1)+" / "+QUESTIONS.length : "";
  chars=[...q.text];
  order=shuffle(chars.map(function(_,i){return i;}));
  solved=false;
  document.getElementById("result").textContent="";
  document.getElementById("result").className="";
  document.getElementById("check-btn").disabled=false;
  document.getElementById("action-btns").style.display="none";
  render();
}
function shuffle(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}
  var same=true;
  for(var k=0;k<b.length;k++){if(b[k]!==a[k]){same=false;break;}}
  return (same&&b.length>1)?shuffle(a):b;
}
function swapOrder(i,j){var t=order[i];order[i]=order[j];order[j]=t;}

function render(){
  var trow=document.getElementById("trow"); trow.innerHTML="";
  order.forEach(function(ci,pos){
    var t=document.createElement("div");
    t.className="tile";t.textContent=chars[ci];t.dataset.charidx=ci;t.dataset.pos=pos;
    bindTile(t);trow.appendChild(t);
  });
}
function renderDuringDrag(){
  var trow=document.getElementById("trow"); trow.innerHTML="";
  order.forEach(function(ci,pos){
    var t=document.createElement("div");
    t.className="tile"+(ci===drag.val?" ghost":"");
    t.textContent=chars[ci];t.dataset.charidx=ci;t.dataset.pos=pos;
    bindTile(t);trow.appendChild(t);
  });
}
function bindTile(tile){
  tile.addEventListener("touchstart",onTS,{passive:false});
  tile.addEventListener("touchmove",onTM,{passive:false});
  tile.addEventListener("touchend",onTE,{passive:false});
  tile.addEventListener("mousedown",onMD);
}
function startDrag(tile,cx,cy){
  if(solved)return;
  var r=tile.getBoundingClientRect();
  drag.val=parseInt(tile.dataset.charidx);drag.fromIdx=parseInt(tile.dataset.pos);
  drag.ox=cx-r.left;drag.oy=cy-r.top;drag.w=r.width;drag.h=r.height;
  var cl=document.createElement("div");cl.className="dclone";cl.textContent=chars[drag.val];
  cl.style.cssText="width:"+r.width+"px;height:"+r.height+"px;left:"+r.left+"px;top:"+r.top+"px;font-size:"+Math.round(r.width*.52)+"px";
  document.body.appendChild(cl);drag.cl=cl;
}
function moveDrag(cx,cy){
  if(!drag.cl)return;
  drag.cl.style.left=(cx-drag.ox)+"px";drag.cl.style.top=(cy-drag.oy)+"px";
  var dcx=cx-drag.ox+drag.w/2;
  var tiles=Array.from(document.getElementById("trow").querySelectorAll(".tile"));
  if(drag.fromIdx>0){
    var lr=tiles[drag.fromIdx-1].getBoundingClientRect();
    if(dcx<lr.left+lr.width/2){swapOrder(drag.fromIdx,drag.fromIdx-1);drag.fromIdx--;renderDuringDrag();soundSwap();return;}
  }
  if(drag.fromIdx<order.length-1){
    var rr=tiles[drag.fromIdx+1].getBoundingClientRect();
    if(dcx>rr.left+rr.width/2){swapOrder(drag.fromIdx,drag.fromIdx+1);drag.fromIdx++;renderDuringDrag();soundSwap();return;}
  }
}
function endDrag(){
  if(drag.val===null)return;
  if(drag.cl){drag.cl.remove();drag.cl=null;}
  drag.val=null;drag.fromIdx=-1;render();
}
function onTS(e){e.preventDefault();var t=e.touches[0];startDrag(e.currentTarget,t.clientX,t.clientY);}
function onTM(e){e.preventDefault();var t=e.touches[0];moveDrag(t.clientX,t.clientY);}
function onTE(e){e.preventDefault();endDrag();}
function onMD(e){
  e.preventDefault();startDrag(e.currentTarget,e.clientX,e.clientY);
  function mm(e2){moveDrag(e2.clientX,e2.clientY);}
  function mu(){endDrag();document.removeEventListener("mousemove",mm);document.removeEventListener("mouseup",mu);}
  document.addEventListener("mousemove",mm);document.addEventListener("mouseup",mu);
}

document.getElementById("check-btn").addEventListener("click",function(){
  if(drag.val!==null)return;
  var ok=true;
  for(var i=0;i<order.length;i++){if(order[i]!==i){ok=false;break;}}
  var res=document.getElementById("result");
  if(ok){
    solved=true;
    document.getElementById("check-btn").disabled=true;
    Array.from(document.getElementById("trow").querySelectorAll(".tile")).forEach(function(t){t.classList.add("correct");});
    var q=QUESTIONS[qIdx];
    if(qIdx<QUESTIONS.length-1){
      soundCorrect();
      res.textContent="🎉 せいかい！ 「"+q.text+"」！";
      res.className="ok";
      setTimeout(function(){qIdx++;initRound();},2000);
    }else{
      soundAllClear();
      res.textContent="🎊 全問せいかい！ すごい！";
      res.className="ok";
      setTimeout(function(){document.getElementById("action-btns").style.display="flex";},2000);
    }
  }else{
    res.textContent="❌ もう少し！ 並び順を確かめよう";
    res.className="ng";
    soundWrong();
  }
});

/* ===== 効果音 ===== */
var audioCtx=null;
function getCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended")audioCtx.resume();
  return audioCtx;
}
function soundSwap(){
  var ctx=getCtx();var osc=ctx.createOscillator();var g=ctx.createGain();
  osc.connect(g);g.connect(ctx.destination);osc.type="sine";osc.frequency.value=520;
  g.gain.setValueAtTime(0.12,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.07);
  osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.08);
}
function soundCorrect(){
  var ctx=getCtx();var t=ctx.currentTime;
  [[523,0],[659,.13],[784,.26],[1047,.42]].forEach(function(p){
    var osc=ctx.createOscillator();var g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);osc.type="sine";osc.frequency.value=p[0];
    g.gain.setValueAtTime(0.28,t+p[1]);g.gain.exponentialRampToValueAtTime(0.001,t+p[1]+0.3);
    osc.start(t+p[1]);osc.stop(t+p[1]+0.31);
  });
}
function soundWrong(){
  var ctx=getCtx();var osc=ctx.createOscillator();var g=ctx.createGain();
  osc.connect(g);g.connect(ctx.destination);osc.type="sine";
  osc.frequency.setValueAtTime(360,ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(140,ctx.currentTime+0.38);
  g.gain.setValueAtTime(0.22,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.38);
  osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.39);
}
function bellTone(freq,startTime,dur){
  var ctx=getCtx();
  var o1=ctx.createOscillator();var g1=ctx.createGain();
  o1.connect(g1);g1.connect(ctx.destination);o1.type="sine";o1.frequency.value=freq;
  g1.gain.setValueAtTime(0,startTime);g1.gain.linearRampToValueAtTime(0.3,startTime+0.012);
  g1.gain.exponentialRampToValueAtTime(0.001,startTime+dur);
  o1.start(startTime);o1.stop(startTime+dur+0.05);
  var o2=ctx.createOscillator();var g2=ctx.createGain();
  o2.connect(g2);g2.connect(ctx.destination);o2.type="sine";o2.frequency.value=freq*2.756;
  g2.gain.setValueAtTime(0,startTime);g2.gain.linearRampToValueAtTime(0.12,startTime+0.008);
  g2.gain.exponentialRampToValueAtTime(0.001,startTime+Math.min(dur*0.22,0.35));
  o2.start(startTime);o2.stop(startTime+Math.min(dur*0.22,0.35)+0.05);
}
