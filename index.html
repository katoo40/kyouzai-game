<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="マッチングゲーム">
<title>画像マッチングゲーム</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1e3d6e;font-family:'Hiragino Kaku Gothic Pro',sans-serif;
  color:#fff;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
  padding-top:env(safe-area-inset-top)}
#setup{display:flex;flex-direction:column;align-items:center;
  min-height:100svh;padding:20px 18px 40px;gap:12px;overflow-y:auto}
#setup h1{font-size:21px;letter-spacing:.08em;text-align:center;margin-top:4px}
.hint-box{background:rgba(255,255,255,.1);border-radius:12px;
  padding:11px 16px;font-size:13px;line-height:2;
  width:100%;max-width:540px;text-align:center}
.hint-box b{color:#FFD700}
.slot-tabs{display:flex;gap:8px;width:100%;max-width:510px}
.slot-tab{flex:1;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.25);
  border-radius:12px;padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:5px;color:rgba(255,255,255,.7);font-size:12px;font-weight:bold;
  -webkit-tap-highlight-color:transparent;transition:.2s}
.slot-tab.active{border-color:#FFD700;background:rgba(255,215,0,.15);color:#FFD700}
.slot-thumb{width:52px;height:52px;border-radius:8px;background:rgba(255,255,255,.08);
  overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px}
.slot-thumb img{width:100%;height:100%;object-fit:cover}
.count-sel{display:flex;align-items:center;gap:10px;width:100%;max-width:510px}
.count-label{font-size:14px;color:rgba(255,255,255,.8);white-space:nowrap}
.count-btns{display:flex;gap:6px}
.cnt-btn{width:42px;height:42px;border-radius:10px;border:2px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:17px;font-weight:bold;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:.2s}
.cnt-btn.active{border-color:#FFD700;background:rgba(255,215,0,.2);color:#FFD700}
.counter{font-size:15px;font-weight:bold;background:rgba(255,255,255,.1);
  border-radius:8px;padding:6px 18px;letter-spacing:.04em}
.counter span{color:#FFD700}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:100%;max-width:510px}
.slot{aspect-ratio:1;background:rgba(255,255,255,.08);
  border:3px dashed rgba(255,255,255,.35);border-radius:14px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;position:relative;-webkit-tap-highlight-color:transparent}
.slot.target-s{border-color:rgba(255,215,0,.6)}
.slot.filled{border-style:solid;border-color:#4CAF50;background:rgba(76,175,80,.08)}
.slot.filled.target-s{border-color:#FFD700}
.slot input[type=file]{position:absolute;width:0;height:0;opacity:0}
.slot .prev{width:100%;height:100%;object-fit:contain;display:none;pointer-events:none}
.slot.filled .prev{display:block}
.slot .icon{font-size:26px;pointer-events:none}
.slot.filled .icon,.slot.filled .lbl{display:none}
.slot .lbl{font-size:10px;color:rgba(255,255,255,.5);text-align:center;
  padding:3px 4px;margin-top:3px;pointer-events:none}
.badge{position:absolute;top:3px;left:50%;transform:translateX(-50%);
  background:#FFD700;color:#333;font-size:9px;font-weight:bold;
  padding:2px 5px;border-radius:4px;white-space:nowrap;pointer-events:none}
.ck{position:absolute;top:4px;right:4px;background:#4CAF50;color:#fff;
  font-size:12px;width:20px;height:20px;border-radius:50%;
  display:none;align-items:center;justify-content:center;pointer-events:none}
.slot.filled .ck{display:flex}
.movie-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.mv-slot{width:110px;height:110px;background:rgba(0,0,0,.3);
  border:3px dashed rgba(255,255,255,.35);border-radius:14px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  position:relative;-webkit-tap-highlight-color:transparent}
.mv-slot.filled{border-style:solid;border-color:#4CAF50}
.mv-slot input[type=file]{position:absolute;width:0;height:0;opacity:0}
.mv-slot .icon{font-size:26px;pointer-events:none}
.mv-slot .lbl{font-size:10px;color:rgba(255,255,255,.6);text-align:center;
  padding:0 5px;max-width:100px;pointer-events:none}
.skip-lbl{display:flex;align-items:center;gap:7px;font-size:13px;
  color:rgba(255,255,255,.8);cursor:pointer}
#start-btn{background:#4CAF50;color:#fff;border:none;padding:16px 54px;
  font-size:22px;font-weight:bold;border-radius:14px;cursor:pointer;
  letter-spacing:.08em;box-shadow:0 4px 16px rgba(76,175,80,.4);margin-top:4px;
  -webkit-tap-highlight-color:transparent}
#start-btn:active{transform:scale(.97)}
#start-btn:disabled{background:#555;box-shadow:none;opacity:.5;cursor:not-allowed;transform:none}
#game{display:none;flex-direction:column;position:fixed;top:env(safe-area-inset-top);left:0;right:0;bottom:0;
  background:#1e3d6e;width:100%;height:100svh}
.hdr{display:flex;align-items:center;justify-content:center;padding:10px 20px}
.dots{display:flex;gap:10px}
.dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.2);
  border:2px solid rgba(255,255,255,.4);transition:background .3s}
.dot.done{background:#FFD700;border-color:#FFD700}
.dot.cur{background:#fff;border-color:#fff}
.top{flex:1;display:flex;align-items:center;justify-content:center}
.dz{width:clamp(150px,22vw,240px);height:clamp(150px,22vw,240px);
  border:4px dashed rgba(255,255,255,.4);border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.05);transition:.15s;position:relative}
.dz.over{border-color:#FFD700;background:rgba(255,215,0,.15);transform:scale(1.04)}
.dz>img{width:88%;height:88%;object-fit:contain;pointer-events:none}
.droplbl{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);
  font-size:13px;color:rgba(255,255,255,.5);white-space:nowrap}
.btm{background:rgba(0,0,0,.25);padding:clamp(10px,2vw,18px);
  min-height:clamp(120px,18vh,180px);display:flex;align-items:center;
  justify-content:center;gap:clamp(8px,2vw,18px);flex-wrap:wrap}
.card{width:clamp(90px,13vw,145px);height:clamp(90px,13vw,145px);
  background:#fff;border-radius:12px;display:flex;align-items:center;
  justify-content:center;cursor:grab;touch-action:none;overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.3);flex-shrink:0;transition:opacity .2s}
.card img{width:88%;height:88%;object-fit:contain;pointer-events:none}
.card.ghost{opacity:.2}
#mv{display:none;position:fixed;inset:0;background:#000;z-index:100;
  align-items:center;justify-content:center;flex-direction:column}
#mv video{max-width:100%;max-height:100svh}
#skip-mv{position:absolute;bottom:28px;right:28px;background:rgba(255,255,255,.2);
  color:#fff;border:2px solid rgba(255,255,255,.5);padding:12px 24px;
  font-size:18px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#fb{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:200;opacity:0;transition:opacity .2s;
  font-size:clamp(50px,9vw,90px);font-weight:bold;text-shadow:0 4px 20px rgba(0,0,0,.6)}
#fb.show{opacity:1}
#fb.ok{background:rgba(76,175,80,.15);color:#4CAF50}
.dclone{position:fixed;pointer-events:none;z-index:9999;border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);transform:scale(1.08);opacity:.9;
  background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.dclone img{width:88%;height:88%;object-fit:contain}
#fw{display:none;position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.particle{position:absolute;width:14px;height:14px;border-radius:50%;
  animation:pop 1s ease-out forwards}
@keyframes pop{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
#reward-tap{display:none;position:fixed;inset:0;z-index:350;
  background:rgba(0,0,0,.88);align-items:center;justify-content:center;
  flex-direction:column;gap:24px}
#reward-tap .rt-emoji{font-size:68px}
#reward-tap .rt-title{font-size:26px;color:#FFD700;font-weight:bold;letter-spacing:.06em}
#watch-mv-btn{background:#e74c3c;color:#fff;border:none;padding:18px 48px;
  font-size:22px;font-weight:bold;border-radius:14px;cursor:pointer;
  box-shadow:0 4px 18px rgba(231,76,60,.5);-webkit-tap-highlight-color:transparent}
#watch-mv-btn:active{transform:scale(.96)}
#end{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);
  align-items:center;justify-content:center}
.end-box{background:#1e3d6e;border:3px solid #FFD700;border-radius:24px;
  padding:36px 44px;text-align:center;display:flex;flex-direction:column;
  align-items:center;gap:18px;min-width:260px}
.end-emoji{font-size:56px}
.end-title{font-size:24px;font-weight:bold;color:#FFD700}
.ebtn{width:100%;background:#4CAF50;color:#fff;border:none;padding:14px;
  font-size:18px;font-weight:bold;border-radius:12px;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
.ebtn:active{transform:scale(.97)}
.ebtn.out{background:transparent;border:2px solid rgba(255,255,255,.5);color:rgba(255,255,255,.8)}
</style>
</head>
<body>

<div id="setup">
  <h1>🎮 画像マッチングゲーム</h1>
  <div class="hint-box">
    <b>① 設定を選ぶ</b>　<b>② 画像・ムービー選択</b>　<b>③ ゲームスタート！</b>
  </div>

  <!-- スロットタブ -->
  <div class="slot-tabs" id="slot-tabs">
    <button class="slot-tab active" data-slot="0">
      <div class="slot-thumb" id="sthumb-0"><span>📋</span></div>
      <span>設定 1</span>
    </button>
    <button class="slot-tab" data-slot="1">
      <div class="slot-thumb" id="sthumb-1"><span>📋</span></div>
      <span>設定 2</span>
    </button>
    <button class="slot-tab" data-slot="2">
      <div class="slot-thumb" id="sthumb-2"><span>📋</span></div>
      <span>設定 3</span>
    </button>
  </div>

  <!-- 選択肢の数 -->
  <div class="count-sel">
    <span class="count-label">選択肢の数：</span>
    <div class="count-btns">
      <button class="cnt-btn" data-n="2">2</button>
      <button class="cnt-btn" data-n="3">3</button>
      <button class="cnt-btn active" data-n="4">4</button>
      <button class="cnt-btn" data-n="5">5</button>
      <button class="cnt-btn" data-n="6">6</button>
    </div>
  </div>

  <div class="counter">選択済み：<span id="cnt">0</span> / <span id="max-cnt">4</span>枚</div>
  <div class="grid">
    <label class="slot target-s" id="slot-0" for="fi-0">
      <input type="file" id="fi-0" accept="image/*">
      <div class="badge">★ターゲット</div><div class="ck">✓</div>
      <span class="icon">🖼</span><span class="lbl">← タップ</span>
      <img class="prev" alt="">
    </label>
    <label class="slot" id="slot-1" for="fi-1">
      <input type="file" id="fi-1" accept="image/*">
      <div class="ck">✓</div><span class="icon">🖼</span><span class="lbl">画像2</span>
      <img class="prev" alt="">
    </label>
    <label class="slot" id="slot-2" for="fi-2">
      <input type="file" id="fi-2" accept="image/*">
      <div class="ck">✓</div><span class="icon">🖼</span><span class="lbl">画像3</span>
      <img class="prev" alt="">
    </label>
    <label class="slot" id="slot-3" for="fi-3">
      <input type="file" id="fi-3" accept="image/*">
      <div class="ck">✓</div><span class="icon">🖼</span><span class="lbl">画像4</span>
      <img class="prev" alt="">
    </label>
    <label class="slot" id="slot-4" for="fi-4">
      <input type="file" id="fi-4" accept="image/*">
      <div class="ck">✓</div><span class="icon">🖼</span><span class="lbl">画像5</span>
      <img class="prev" alt="">
    </label>
    <label class="slot" id="slot-5" for="fi-5">
      <input type="file" id="fi-5" accept="image/*">
      <div class="ck">✓</div><span class="icon">🖼</span><span class="lbl">画像6</span>
      <img class="prev" alt="">
    </label>
  </div>
  <div class="movie-wrap">
    <label class="mv-slot" id="mv-slot" for="fi-movie">
      <input type="file" id="fi-movie" accept="video/*">
      <span class="icon">🎬</span>
      <span class="lbl" id="mv-lbl">ご褒美ムービー（タップ）</span>
    </label>
    <label class="skip-lbl">
      <input type="checkbox" id="skip-video"> ムービーなし（花火アニメ）
    </label>
  </div>
  <button id="start-btn" disabled>ゲームスタート ▶</button>
</div>

<div id="game">
  <div class="hdr"><div class="dots" id="dots"></div></div>
  <div class="top"><div class="dz" id="dz">
    <img id="tgt" src="" alt="">
    <div class="droplbl">ここにドラッグ</div>
  </div></div>
  <div class="btm" id="choices"></div>
</div>
<div id="mv"><video id="vid" playsinline webkit-playsinline></video><button id="skip-mv">スキップ →</button></div>
<div id="fb"></div>
<div id="fw"></div>
<div id="reward-tap">
  <div class="rt-emoji">🎉</div>
  <div class="rt-title">やったー！クリア！</div>
  <button id="watch-mv-btn">🎬 ムービーを見る！</button>
</div>
<div id="end">
  <div class="end-box">
    <div class="end-emoji">🎊</div>
    <div class="end-title">ゲームクリア！</div>
    <button class="ebtn" id="replay-btn">もう一度！</button>
    <button class="ebtn out" id="back-btn">設定に戻る</button>
  </div>
</div>

<script>
'use strict';
var NUM_SLOTS=3;
var currentSlot=parseInt(localStorage.getItem('mg_current_slot')||'0');
var S={imgs:['','','','','',''],movieFile:null,skipVideo:false,count:4};
var filled=0;
var IMGS=[],MOVIE_FILE=null,HAS_MOVIE=false;
var level=1,judging=false,MAX_LEVEL=4;
var drag={el:null,cl:null,ox:0,oy:0,w:0,h:0,judged:false};
var movieObjectURL=null;

/* ===== IndexedDB ===== */
var DB=null;
function openDB(cb){
  if(DB){cb(DB);return;}
  var req=indexedDB.open('MatchingGame',1);
  req.onupgradeneeded=function(e){e.target.result.createObjectStore('assets');};
  req.onsuccess=function(e){DB=e.target.result;cb(DB);};
  req.onerror=function(){cb(null);};
}
function saveVideoToDB(blob){
  openDB(function(db){
    if(!db)return;
    var tx=db.transaction('assets','readwrite');
    tx.objectStore('assets').put(blob,'video_'+currentSlot);
  });
}
function loadVideoFromDB(slot,cb){
  openDB(function(db){
    if(!db){cb(null);return;}
    var tx=db.transaction('assets','readonly');
    var req=tx.objectStore('assets').get('video_'+slot);
    req.onsuccess=function(e){cb(e.target.result||null);};
    req.onerror=function(){cb(null);};
  });
}
function clearVideoDB(){
  openDB(function(db){
    if(!db)return;
    var tx=db.transaction('assets','readwrite');
    tx.objectStore('assets').delete('video_'+currentSlot);
  });
}

/* ===== 旧データ移行（初回のみ） ===== */
function migrateOldData(cb){
  var hasNew=localStorage.getItem('mg_img_0_0');
  var hasOld=localStorage.getItem('mg_img_0');
  if(!hasNew&&hasOld){
    for(var i=0;i<6;i++){
      var d=localStorage.getItem('mg_img_'+i);
      if(d)try{localStorage.setItem('mg_img_'+i+'_0',d);}catch(e){}
    }
    var sk=localStorage.getItem('mg_skip');
    if(sk)localStorage.setItem('mg_skip_0',sk);
    var vn=localStorage.getItem('mg_vidname');
    if(vn)localStorage.setItem('mg_vidname_0',vn);
    openDB(function(db){
      if(!db){cb();return;}
      var tx=db.transaction('assets','readonly');
      var req=tx.objectStore('assets').get('video');
      req.onsuccess=function(e){
        if(e.target.result){
          var tx2=db.transaction('assets','readwrite');
          tx2.objectStore('assets').put(e.target.result,'video_0');
        }
        cb();
      };
      req.onerror=function(){cb();};
    });
  }else{cb();}
}

/* ===== localStorage（スロット対応） ===== */
function saveImage(i,dataURL){
  try{localStorage.setItem('mg_img_'+i+'_'+currentSlot,dataURL);}catch(e){}
}
function saveSkip(v){
  try{localStorage.setItem('mg_skip_'+currentSlot,v?'1':'0');}catch(e){}
}
function saveVideoName(name){
  try{localStorage.setItem('mg_vidname_'+currentSlot,name);}catch(e){}
}
function saveCount(v){
  try{localStorage.setItem('mg_count_'+currentSlot,v);}catch(e){}
}

/* ===== 選択肢数UI ===== */
function updateCountUI(n){
  document.querySelectorAll('.cnt-btn').forEach(function(b){
    b.classList.toggle('active',parseInt(b.dataset.n)===n);
  });
  document.getElementById('max-cnt').textContent=n;
}
function updateGridVisibility(n){
  for(var i=0;i<6;i++){
    document.getElementById('slot-'+i).style.display=i<n?'':'none';
  }
}
function recalcFilled(){
  filled=0;
  for(var i=0;i<S.count;i++){
    if(S.imgs[i]!=='')filled++;
  }
  document.getElementById('cnt').textContent=filled;
}

/* ===== スロットタブ更新 ===== */
function updateSlotTabs(){
  for(var n=0;n<NUM_SLOTS;n++){
    var tab=document.querySelector('.slot-tab[data-slot="'+n+'"]');
    var thumb=document.getElementById('sthumb-'+n);
    tab.classList.toggle('active',n===currentSlot);
    var img0=localStorage.getItem('mg_img_0_'+n);
    if(img0){
      thumb.innerHTML='<img src="'+img0+'" alt="">';
    }else{
      thumb.innerHTML='<span>📋</span>';
    }
  }
}

/* ===== スロット切替 ===== */
function switchSlot(n){
  if(n===currentSlot)return;
  currentSlot=n;
  localStorage.setItem('mg_current_slot',n);
  S={imgs:['','','','','',''],movieFile:null,skipVideo:false,count:4};
  filled=0;
  for(var i=0;i<6;i++){
    var sl=document.getElementById('slot-'+i);
    sl.classList.remove('filled');
    sl.querySelector('.prev').src='';
  }
  document.getElementById('mv-slot').classList.remove('filled');
  document.getElementById('mv-lbl').textContent='ご褒美ムービー（タップ）';
  document.getElementById('skip-video').checked=false;
  document.getElementById('cnt').textContent='0';
  loadSlot(n,function(){updateSlotTabs();checkReady();});
}

/* ===== スロット読み込み ===== */
function loadSlot(n,cb){
  var cnt=parseInt(localStorage.getItem('mg_count_'+n)||'4');
  S.count=cnt;
  updateCountUI(cnt);
  updateGridVisibility(cnt);
  for(var i=0;i<6;i++){
    var d=localStorage.getItem('mg_img_'+i+'_'+n);
    if(d){
      S.imgs[i]=d;
      var sl=document.getElementById('slot-'+i);
      sl.querySelector('.prev').src=d;
      sl.classList.add('filled');
    }
  }
  recalcFilled();
  var skip=localStorage.getItem('mg_skip_'+n)==='1';
  S.skipVideo=skip;
  document.getElementById('skip-video').checked=skip;
  loadVideoFromDB(n,function(blob){
    if(blob){
      S.movieFile=blob;
      var name=localStorage.getItem('mg_vidname_'+n)||'ムービー';
      document.getElementById('mv-lbl').textContent=name.length>16?name.slice(0,14)+'…':name;
      document.getElementById('mv-slot').classList.add('filled');
    }
    if(cb)cb();
  });
}

/* ===== 起動時初期化 ===== */
function init(){
  migrateOldData(function(){
    loadSlot(currentSlot,function(){
      updateSlotTabs();
      checkReady();
    });
  });
  document.querySelectorAll('.slot-tab').forEach(function(tab){
    tab.addEventListener('click',function(){
      switchSlot(parseInt(this.dataset.slot));
    });
  });
  document.querySelectorAll('.cnt-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var n=parseInt(this.dataset.n);
      S.count=n;
      saveCount(n);
      updateCountUI(n);
      updateGridVisibility(n);
      recalcFilled();
      checkReady();
    });
  });
}

/* ===== 画像圧縮 ===== */
function compress(dataURL,cb){
  var img=new Image();
  img.onload=function(){
    var MAX=500,s=Math.min(MAX/img.width,MAX/img.height,1);
    var w=Math.round(img.width*s),h=Math.round(img.height*s);
    var c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.85));
  };
  img.src=dataURL;
}

/* ===== 画像選択 ===== */
for(var ii=0;ii<6;ii++){
  (function(i){
    document.getElementById('fi-'+i).addEventListener('change',function(){
      var file=this.files&&this.files[0];if(!file)return;
      var r=new FileReader();
      r.onload=function(e){
        compress(e.target.result,function(c){
          S.imgs[i]=c;
          var sl=document.getElementById('slot-'+i);
          sl.querySelector('.prev').src=c;
          sl.classList.add('filled');
          saveImage(i,c);
          recalcFilled();
          if(i===0)updateSlotTabs();
          checkReady();
        });
      };
      r.readAsDataURL(file);
    });
  })(ii);
}

/* ===== 動画選択 ===== */
document.getElementById('fi-movie').addEventListener('change',function(){
  var file=this.files&&this.files[0];if(!file)return;
  S.movieFile=file;
  var name=file.name.length>16?file.name.slice(0,14)+'…':file.name;
  document.getElementById('mv-lbl').textContent=name;
  document.getElementById('mv-slot').classList.add('filled');
  saveVideoToDB(file);
  saveVideoName(file.name);
  checkReady();
});

document.getElementById('skip-video').addEventListener('change',function(){
  S.skipVideo=this.checked;
  saveSkip(this.checked);
  if(this.checked){clearVideoDB();S.movieFile=null;}
  checkReady();
});

function checkReady(){
  var imgsOk=S.imgs.slice(0,S.count).every(function(u){return u!=='';});
  var ok=imgsOk&&(S.skipVideo||S.movieFile!==null);
  document.getElementById('start-btn').disabled=!ok;
}

/* ===== ゲーム開始 ===== */
document.getElementById('start-btn').addEventListener('click',function(){
  IMGS=S.imgs.slice(0,S.count);
  MAX_LEVEL=S.count;
  HAS_MOVIE=!S.skipVideo&&S.movieFile!==null;
  MOVIE_FILE=HAS_MOVIE?S.movieFile:null;
  level=1;judging=false;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='flex';
  document.getElementById('end').style.display='none';
  buildDots();renderLevel(1);
});
document.getElementById('replay-btn').addEventListener('click',function(){
  document.getElementById('end').style.display='none';
  level=1;judging=false;renderLevel(1);
});
document.getElementById('back-btn').addEventListener('click',function(){
  document.getElementById('end').style.display='none';
  document.getElementById('game').style.display='none';
  document.getElementById('setup').style.display='flex';
});
document.getElementById('skip-mv').addEventListener('click',endReward);
document.getElementById('watch-mv-btn').addEventListener('click',function(){
  document.getElementById('reward-tap').style.display='none';
  if(movieObjectURL){URL.revokeObjectURL(movieObjectURL);movieObjectURL=null;}
  movieObjectURL=URL.createObjectURL(MOVIE_FILE);
  var v=document.getElementById('vid');
  v.src=movieObjectURL;
  document.getElementById('mv').style.display='flex';
  var p=v.play();if(p&&p.catch)p.catch(function(){});
  v.onended=endReward;
});

/* ===== 効果音 ===== */
var audioCtx=null;
function getCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function playTone(freq,delay,dur,type,vol){
  var ctx=getCtx();
  var osc=ctx.createOscillator();var g=ctx.createGain();
  osc.connect(g);g.connect(ctx.destination);
  osc.type=type||'sine';osc.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.28,ctx.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);
  osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+dur+0.01);
}
function soundCorrect(){
  playTone(523,0,.14);playTone(659,.13,.14);playTone(784,.26,.28);
}
function soundWrong(){
  var ctx=getCtx();
  var osc=ctx.createOscillator();var g=ctx.createGain();
  osc.connect(g);g.connect(ctx.destination);
  osc.type='sine';
  osc.frequency.setValueAtTime(360,ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(140,ctx.currentTime+0.38);
  g.gain.setValueAtTime(0.22,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.38);
  osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.39);
}

/* ===== ゲームロジック ===== */
function buildDots(){
  var c=document.getElementById('dots');c.innerHTML='';
  for(var i=1;i<=MAX_LEVEL;i++){var d=document.createElement('div');d.className='dot';d.dataset.lv=i;c.appendChild(d);}
}
function updateDots(lv){
  document.querySelectorAll('.dot').forEach(function(d){
    var n=parseInt(d.dataset.lv);
    d.className='dot'+(n<lv?' done':n===lv?' cur':'');
  });
}
function shuffle(a){
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function renderLevel(lv){
  level=lv;updateDots(lv);
  document.getElementById('tgt').src=IMGS[0];
  document.getElementById('dz').classList.remove('over');
  var idx=[];for(var i=0;i<lv;i++)idx.push(i);shuffle(idx);
  var area=document.getElementById('choices');area.innerHTML='';
  for(var j=0;j<idx.length;j++){
    var ii=idx[j];
    var card=document.createElement('div');card.className='card';card.dataset.i=ii;
    var img=document.createElement('img');img.src=IMGS[ii];
    card.appendChild(img);bindDrag(card);area.appendChild(card);
  }
}
function bindDrag(card){
  card.addEventListener('touchstart',onTS,{passive:false});
  card.addEventListener('touchmove',onTM,{passive:false});
  card.addEventListener('touchend',onTE,{passive:false});
  card.addEventListener('mousedown',onMD);
}
function startDrag(card,cx,cy){
  var r=card.getBoundingClientRect();
  drag.el=card;drag.ox=cx-r.left;drag.oy=cy-r.top;drag.w=r.width;drag.h=r.height;drag.judged=false;
  var cl=document.createElement('div');cl.className='dclone';
  cl.style.cssText='width:'+r.width+'px;height:'+r.height+'px;left:'+r.left+'px;top:'+r.top+'px';
  var img=document.createElement('img');img.src=card.querySelector('img').src;
  cl.appendChild(img);document.body.appendChild(cl);
  drag.cl=cl;card.classList.add('ghost');
}
function moveDrag(cx,cy){
  if(!drag.cl)return;
  drag.cl.style.left=(cx-drag.ox)+'px';drag.cl.style.top=(cy-drag.oy)+'px';
  var over=isCenterOver(cx,cy);
  document.getElementById('dz').classList.toggle('over',over);
  if(over&&!drag.judged&&!judging){
    drag.judged=true;
    var idx=parseInt(drag.el.dataset.i);
    var cl=drag.cl;var card=drag.el;
    drag.cl=null;drag.el=null;
    document.getElementById('dz').classList.remove('over');
    if(idx===0){
      cl.remove();card.classList.remove('ghost');
      soundCorrect();judge();
    }else{
      soundWrong();
      var tr=card.getBoundingClientRect();
      var _=cl.offsetLeft;
      cl.style.transition='left .4s cubic-bezier(.4,0,.2,1),top .4s cubic-bezier(.4,0,.2,1),opacity .4s ease';
      cl.style.left=tr.left+'px';cl.style.top=tr.top+'px';cl.style.opacity='0';
      setTimeout(function(){cl.remove();card.classList.remove('ghost');},420);
    }
  }
}
function endDrag(cx,cy){
  if(!drag.el)return;
  if(drag.cl){drag.cl.remove();drag.cl=null;}
  drag.el.classList.remove('ghost');
  document.getElementById('dz').classList.remove('over');
  drag.el=null;
}
function isCenterOver(cx,cy){
  var r=document.getElementById('dz').getBoundingClientRect();
  var cardCx=cx-drag.ox+drag.w/2;
  var cardCy=cy-drag.oy+drag.h/2;
  return cardCx>=r.left&&cardCx<=r.right&&cardCy>=r.top&&cardCy<=r.bottom;
}
function onTS(e){e.preventDefault();var t=e.touches[0];startDrag(e.currentTarget,t.clientX,t.clientY);}
function onTM(e){e.preventDefault();var t=e.touches[0];moveDrag(t.clientX,t.clientY);}
function onTE(e){e.preventDefault();var t=e.changedTouches[0];endDrag(t.clientX,t.clientY);}
function onMD(e){
  e.preventDefault();startDrag(e.currentTarget,e.clientX,e.clientY);
  function mm(e2){moveDrag(e2.clientX,e2.clientY);}
  function mu(e2){endDrag(e2.clientX,e2.clientY);document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);}
  document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
}
function judge(){
  if(judging)return;
  judging=true;
  feedback('せいかい!','ok',1200,function(){judging=false;if(level>=MAX_LEVEL)showReward();else renderLevel(level+1);});
}
function feedback(txt,cls,ms,cb){
  var el=document.getElementById('fb');el.textContent=txt;el.className='show '+cls;
  setTimeout(function(){el.className='';if(cb)cb();},ms);
}
function showReward(){
  if(HAS_MOVIE){document.getElementById('reward-tap').style.display='flex';}
  else{startFireworks();}
}
function endReward(){
  var v=document.getElementById('vid');
  v.pause();v.removeAttribute('src');v.load();
  if(movieObjectURL){URL.revokeObjectURL(movieObjectURL);movieObjectURL=null;}
  document.getElementById('mv').style.display='none';
  document.getElementById('reward-tap').style.display='none';
  document.getElementById('end').style.display='flex';
}
function startFireworks(){
  var fw=document.getElementById('fw');fw.style.display='block';
  var count=0;
  var timer=setInterval(function(){
    if(count++>60){clearInterval(timer);fw.style.display='none';fw.innerHTML='';
      document.getElementById('end').style.display='flex';return;}
    var p=document.createElement('div');p.className='particle';
    p.style.left=Math.random()*100+'vw';p.style.top=Math.random()*100+'vh';
    p.style.background='hsl('+Math.floor(Math.random()*360)+',90%,60%)';
    p.style.animationDuration=(0.5+Math.random())+'s';
    fw.appendChild(p);setTimeout(function(){p.remove();},1500);
  },80);
}

init();
</script>
